<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Panel Admin</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body class="login-body">

<!-- LOGIN -->
<div class="login-container">
  <div class="login-card">
    <h2>Perfumes Admin</h2>

    <input type="email" id="email" placeholder="Correo">
    <input type="password" id="password" placeholder="Contraseña">

    <button onclick="login()">Ingresar</button>
  </div>
</div>

<!-- DASHBOARD -->
<div id="panel" class="dashboard">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <h2>Admin</h2>
    <button>Productos</button>
    <button onclick="logout()">Cerrar sesión</button>
  </aside>

  <!-- CONTENIDO -->
  <main class="content">

    <header class="admin-header">
      <h1>Gestión de Productos</h1>
      <div id="userInfo"></div>
    </header>

    <!-- FORM -->
    <section class="admin-form">
      <input type="text" id="name" placeholder="Nombre">
      <input type="text" id="brand" placeholder="Marca">

      <select id="category">
        <option value="Hombre">Hombre</option>
        <option value="Mujer">Mujer</option>
        <option value="Unisex">Unisex</option>
      </select>

      <input type="text" id="price" placeholder="Precio">
      <input type="text" id="image" placeholder="URL de la imagen">

      <button onclick="addProduct()">Guardar</button>
    </section>

    <!-- LISTA -->
    <section id="list" class="grid"></section>

  </main>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<script src="admin.js"></script>

</body>
</html>
